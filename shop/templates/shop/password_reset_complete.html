<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed | Water Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    {% load static %}
    <link rel="stylesheet" href="{% static 'shop/style.css' %}">
</head>
<body>
    <div class="login-wrapper">
        <div>
            <div class="login-card">
                <div class="login-card-header">
                    <div class="drop-icon">✅</div>
                    <h4>Password Changed</h4>
                    <p>Your password has been updated successfully</p>
                </div>
                <div class="login-card-body">
                    <p style="color: var(--text-muted); font-size: 0.875rem; text-align: center; margin-bottom: 1rem;">
                        You can now log in with your new password.
                    </p>
                    <a href="{% url 'login' %}" class="btn btn-primary w-100">Go to Login</a>
                    <div class="login-divider">
                        <hr><span>Water Refill Station</span><hr>
                    </div>
                </div>
            </div>
            <p class="login-footer">Authorized personnel only</p>
        </div>
    </div>
</body>
</html>
