{% extends 'shop/base.html' %}

{% block title %}Tank Level Entry | Water Shop{% endblock %}

{% block content %}
<h2 class="mb-4">Log Tank Level</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save Reading</button>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
