<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password | Water Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    {% load static %}
    <link rel="stylesheet" href="{% static 'shop/style.css' %}">
</head>
<body>
    <div class="login-wrapper">
        <div>
            <div class="login-card">
                <div class="login-card-header">
                    <div class="drop-icon">🔑</div>
                    <h4>Set New Password</h4>
                    <p>Enter your new password below</p>
                </div>
                <div class="login-card-body">
                    {% if validlink %}
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100 mt-2">Set New Password</button>
                    </form>
                    {% else %}
                    <div class="alert alert-danger">
                        This reset link is invalid or has expired. Please request a new one.
                    </div>
                    <a href="{% url 'password_reset' %}" class="btn btn-primary w-100">Request New Link</a>
                    {% endif %}
                    <div class="login-divider">
                        <hr><span>Water Refill Station</span><hr>
                    </div>
                </div>
            </div>
            <p class="login-footer">Authorized personnel only</p>
        </div>
    </div>
</body>
</html>
