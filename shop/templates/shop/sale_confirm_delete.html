{% extends 'shop/base.html' %}

{% block content %}
<h2>Delete Sale</h2>

<p>Are you sure you want to delete the sale for <strong>{{ sale.customer }}</strong> — <strong>{{ sale.product }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'sale_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
