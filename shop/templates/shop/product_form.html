{% extends 'shop/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h2>Add Product</h2>

<form method="post">
    {% csrf_token %}
    {% crispy form %}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
